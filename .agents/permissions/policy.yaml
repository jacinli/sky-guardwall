deny:
  read:
    - ".env"
    - ".env.*"
    - "data/**"              # SQLite database files
  write:
    - "docs/**"              # Requirements docs — edit manually
    - "AGENTS.md"            # Top-level agent config — edit manually
    - "go.sum"               # Auto-generated by go mod
    - "*.db"

allow:
  read:
    - "**"
  write:
    - "cmd/**"
    - "internal/**"
    - "frontend/src/**"
    - "frontend/package.json"
    - "frontend/vite.config.ts"
    - "frontend/tsconfig*.json"
    - "go.mod"
    - "Dockerfile"
    - "docker-compose.yml"
    - ".agents/**"
    - ".github/**"
